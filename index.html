  <body>
    <div id="root"></div>
    <script>
      (function (locationData) {
        if (locationData.search[1] === '/') {
          var decoded = locationData.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');

          window.history.replaceState(null, '', decoded + locationData.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
